schema_version: 1
policy_id: example-b-default
documents:
  cv:
    section_order: [identity, summary, experience, projects, skills, education, languages, interests]
    layout:
      minimum_font_size_pt: 10.0
      maximum_font_size_pt: 12.0
      minimum_line_height_ratio: 1.10
      maximum_line_height_ratio: 1.50
    sections:
      identity:
        fidelity: locked
        required: true
        protected_terms: [Jamie Chen]
      summary:
        fidelity: adaptable
        required: true
        target_lines: 4
        min_characters: 150
        max_characters: 520
        protected_fact_ids: [identity.current]
      experience:
        fidelity: very_faithful
        required: true
      projects:
        fidelity: highly_adaptable
        required: true
      skills:
        fidelity: replaceable
        required: true
      education:
        fidelity: locked
        required: true
      languages:
        fidelity: locked
        required: true
      interests:
        fidelity: locked
        required: false
  letter:
    section_order: [body]
    sections:
      body:
        fidelity: highly_adaptable
        required: true
        max_characters: 3000
